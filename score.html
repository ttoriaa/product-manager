<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>竞品评分页 | 汽车产品经理网站</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body>
  <main class="page">
    <header class="sub-header">
      <a href="./index.html" class="back-link">← 返回首页</a>
      <h1>竞品评分页（产品力 / 市场力 / 盈利力）</h1>
      <p>本页用于管理层汇报的快速对比视图。评分为策略讨论口径，不代表财报或官方评级。</p>
      <p id="scoreConfigMeta" class="hint"></p>
      <div id="scoreValidation" class="validation-box"></div>
    </header>

    <section class="radar-panel">
      <div class="radar-box">
        <canvas id="scoreRadar" width="720" height="480" aria-label="三品牌雷达图" role="img"></canvas>
        <div class="radar-actions">
          <button id="exportPngBtn" class="btn btn-primary" type="button">导出雷达图 PNG</button>
        </div>
      </div>

      <div class="legend-box">
        <h2>评分口径（1-10 分）</h2>
        <ul>
          <li><strong>产品力</strong>：平台架构、智能化、产品节奏与技术领先性。</li>
          <li><strong>市场力</strong>：品牌势能、渠道能力、区域覆盖与增长弹性。</li>
          <li><strong>盈利力</strong>：价格体系稳定性、毛利结构、资源效率。</li>
        </ul>

        <table>
          <thead>
            <tr>
              <th>品牌</th>
              <th>产品力</th>
              <th>市场力</th>
              <th>盈利力</th>
            </tr>
          </thead>
          <tbody id="scoreTableBody"></tbody>
        </table>

        <div class="slider-panel">
          <h2>可调分滑杆</h2>
          <p class="hint">拖动滑杆后雷达图和评分表会同步更新，范围 1.0 - 10.0。</p>
          <div id="scoreControls"></div>
        </div>
      </div>
    </section>
  </main>
  <script src="./assets/score.js"></script>
</body>
</html>
